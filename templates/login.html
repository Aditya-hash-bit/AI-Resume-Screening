<!DOCTYPE html>
<html>
<head>

<title>AI Resume Screening System</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
background:white;
padding:40px;
width:380px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-top:10px;
color:#333;
}

input,select{
width:90%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:95%;
padding:10px;
margin-top:10px;
background:#667eea;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#5563c1;
}

hr{
margin:25px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<form action="/register" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<select name="role">

<option value="Candidate">Candidate</option>
<option value="HR">HR</option>

</select>

<input type="text" name="company" placeholder="Company Name (HR only)">

<button type="submit">Register</button>

</form>

<hr>

<h2>Login</h2>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<select name="role">

<option value="Candidate">Candidate</option>
<option value="HR">HR</option>

</select>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
